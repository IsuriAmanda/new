<div class="users-page">

  <div class="page-header">

    <h2>
      User Management
    </h2>

  </div>

  <div class="table-wrapper">

    <table class="users-table">

      <thead>

        <tr>

          <th>Name</th>

          <th>Email</th>

          <th>Role</th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let user of users()"
        >

          <td>
            {{ user.fullName }}
          </td>

          <td>
            {{ user.email }}
          </td>

          <td>
            {{ user.role }}
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
