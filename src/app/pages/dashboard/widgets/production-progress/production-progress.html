<app-dashboard-card>

  <div class="dashboard-title">
    Production Progress
  </div>

  <!-- STAGE COUNTS -->
  <div class="stages-grid">

    <div class="stage-card printing">
      <span>Printing</span>
      <h3>12</h3>
    </div>

    <div class="stage-card cutting">
      <span>Cutting</span>
      <h3>8</h3>
    </div>

    <div class="stage-card folding">
      <span>Folding</span>
      <h3>5</h3>
    </div>

    <div class="stage-card laminating">
      <span>Laminating</span>
      <h3>4</h3>
    </div>

    <div class="stage-card binding">
      <span>Binding</span>
      <h3>6</h3>
    </div>

    <div class="stage-card packing">
      <span>Packing</span>
      <h3>3</h3>
    </div>

  </div>

  <!-- SUMMARY -->
  <div class="progress-summary">

    <div class="summary-item">
      <span>Completed Jobs</span>
      <h4>180</h4>
    </div>

    <div class="summary-item">
      <span>Pending Jobs</span>
      <h4>42</h4>
    </div>

    <div class="summary-item delayed">
      <span>Delayed Jobs</span>
      <h4>8</h4>
    </div>

    <div class="summary-item">
      <span>Avg Completion</span>
      <h4>2.4 Days</h4>
    </div>

  </div>

</app-dashboard-card>
